{% extends "bank/base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-box fade-in">
    <h2 class="mb-3">📝 Create Account</h2>

    <form method="POST">
        {% csrf_token %}
        <input class="form-control mb-2" type="text" name="username" placeholder="Username" required>
        <input class="form-control mb-2" type="password" name="password1" placeholder="Password" required>
        <input class="form-control mb-3" type="password" name="password2" placeholder="Confirm Password" required>

        <button class="btn btn-primary w-100">Register</button>
    </form>
</div>
{% endblock %}
