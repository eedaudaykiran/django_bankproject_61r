{% extends "bank/base.html" %}
{% block title %}Create Savings Account{% endblock %}

{% block content %}

<div class="row justify-content-center fade-in">
    <div class="col-lg-6">

        <div class="pro-card">
            <h2 class="mb-3">👤 Create Savings Account</h2>
            <p class="text-white-50">Fill details to create your savings account.</p>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Account Holder Name</label>
                    <input type="text" name="holder_name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Initial Balance</label>
                    <input type="number" name="balance" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Set PIN</label>
                    <input type="number" name="pin" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Create Savings Account
                </button>
            </form>

        </div>

    </div>
</div>

{% endblock %}
