{% extends "bank/base.html" %}
{% block title %}Create Business Account{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-lg-6">
        <div class="pro-card">
            <h2 class="mb-3">🏢 Create Business Account</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Owner Name</label>
                    <input type="text" name="holder_name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Business Name</label>
                    <input type="text" name="business_name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Initial Balance</label>
                    <input type="number" name="balance" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Create Business Account
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
